services:
  medico:
    image: node:20
    container_name: dashboard-medico
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    expose:
      - "5173"
    networks:
      - sarah-network
    restart: unless-stopped

networks:
  sarah-network:
    external: true