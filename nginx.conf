server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the app under /medico/
    location /medico/ {
        try_files $uri $uri/ /medico/index.html;
    }

    # Redirect root to the subpath (optional)
    location = / {
        return 302 /medico/;
    }
}